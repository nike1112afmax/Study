name: Update Dashboard Data

on:
  schedule:
    - cron: '0 22 * * 1-5'   # 每週一到五 UTC 22:00（台灣時間 06:00）
  workflow_dispatch:           # 允許手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch FRED data
        run: python Study/update_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Study/data.json
          git diff --cached --quiet || git commit -m "chore: update dashboard data $(date +'%Y-%m-%d')"
          git push
