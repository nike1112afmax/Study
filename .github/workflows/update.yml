name: Update Dashboard Data

on:
  schedule:
    - cron: '7 0 * * 1-5'    # 台灣時間 08:07（UTC 00:07）
    - cron: '13 4 * * 1-5'   # 台灣時間 12:13（UTC 04:13）
    - cron: '30 13 * * 1-5'  # 台灣時間 21:30（UTC 13:30）
    - cron: '17 15 * * 1-5'  # 台灣時間 23:17（UTC 15:17）
    - cron: '23 17 * * 1-5'  # 台灣時間 01:23（UTC 17:23）
    - cron: '7 0 * * 6'      # 台灣時間 週六 08:07（UTC 00:07）
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch data
        run: python update_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: update dashboard data $(date +'%Y-%m-%d %H:%M')"
          git push
