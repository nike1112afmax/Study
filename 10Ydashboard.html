<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlobalMacro Dashboard - 全球總經儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0;
    --text2: #b0b5c5;
    --text3: #7a7f90;
    --blue: #4d9eff;
    --green: #3ecf8e;
    --orange: #f7a830;
    --red: #f06060;
    --purple: #a78bfa;
    --teal: #2dd4bf;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background-color: var(--bg);
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234d9eff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    color: var(--text);
    min-height: 100vh; font-size: 15px; line-height: 1.6;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; border-bottom: 1px solid var(--border);
    background: var(--bg2); position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--blue); box-shadow: 0 0 8px var(--blue);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .topbar-title { font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .topbar-sub { font-size: 13px; color: var(--text2); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  #lastUpdate { font-size: 11px; color: var(--text3); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .container { max-width: 1200px; margin: 0 auto; padding: 28px 32px; }
  .section-label {
    font-size: 12px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text2);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px; margin-bottom: 12px;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text2); }
  .range-tabs {
    display: flex; gap: 2px; background: var(--bg3);
    border-radius: var(--radius-sm); padding: 3px;
  }
  .range-tab {
    padding: 4px 10px; border-radius: 5px; border: none;
    background: transparent; color: var(--text3); font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .range-tab.active { background: var(--bg2); color: var(--text); border: 1px solid var(--border2); }
  .range-tab:hover:not(.active) { color: var(--text2); }
  .legend-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--text2); }
  .legend-line { width: 20px; height: 2px; border-radius: 1px; }
  .chart-wrap { position: relative; width: 100%; height: 260px; }
  .chart-wrap-sm { position: relative; width: 100%; height: 200px; }
  .metrics-grid {
    display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-top: 16px;
  }
  @media(max-width:900px){ .metrics-grid{grid-template-columns:repeat(3,1fr)} }
  @media(max-width:600px){ .metrics-grid{grid-template-columns:repeat(2,1fr)} .container{padding:20px 16px} .topbar{padding:12px 16px} }
  .metric-tile {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px; transition: border-color .15s;
  }
  .metric-tile:hover { border-color: var(--border2); }
  .mt-label { font-size: 13px; color: #c8cdd8; margin-bottom: 6px; }
  .mt-value { font-size: 22px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 3px; }
  .mt-change { font-size: 12px; }
  .mt-change.up { color: var(--red); }
  .mt-change.dn { color: var(--green); }
  .mt-change.nt { color: var(--text3); }
  .trend-badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 4px; letter-spacing: .04em;
    text-transform: uppercase; margin-top: 4px;
  }
  .trend-up { background: rgba(240,96,96,.15); color: var(--red); }
  .trend-dn { background: rgba(62,207,142,.15); color: var(--green); }
  .trend-fl { background: rgba(139,144,160,.15); color: var(--text2); }
  .divider { margin: 28px 0; }
  .sentiment-grid {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px;
  }
  @media(max-width:700px){ .sentiment-grid{grid-template-columns:repeat(2,1fr)} }
  .gauge-tile {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px; text-align: center; transition: border-color .15s;
  }
  .gauge-tile:hover { border-color: var(--border2); }
  .gauge-label { font-size: 13px; color: #c8cdd8; letter-spacing: .04em; text-transform: uppercase; margin-bottom: 10px; }
  .gauge-value { font-size: 32px; font-weight: 700; letter-spacing: -.03em; margin-bottom: 4px; }
  .gauge-desc { font-size: 11px; font-weight: 500; letter-spacing: .03em; text-transform: uppercase; margin-bottom: 6px; }
  .gauge-sub { font-size: 12px; color: var(--text2); }
  .color-red { color: var(--red); }
  .color-orange { color: var(--orange); }
  .color-green { color: var(--green); }
  .color-text2 { color: var(--text2); }
  .ext-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--blue); text-decoration: none;
    margin-top: 6px; opacity: .8;
  }
  .ext-link:hover { opacity: 1; }
  .sub-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  @media(max-width:600px){ .sub-charts{grid-template-columns:1fr} }
  .sub-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 20px;
  }
  .sub-card-title { font-size: 13px; color: #c8cdd8; margin-bottom: 12px; }
  .sub-chart-wrap { position: relative; width: 100%; height: 140px; }
  .loading-box {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 10px; padding: 40px; color: var(--text3); font-size: 13px;
  }
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--border2);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  .error-box {
    color: var(--red); font-size: 12px; padding: 12px;
    background: rgba(240,96,96,.08); border: 1px solid rgba(240,96,96,.2);
    border-radius: var(--radius-sm); margin: 8px 0;
  }
  .data-note {
    font-size: 12px; color: var(--text2); text-align: right;
    margin-top: 8px; padding: 0 4px;
  }
  /* 經濟指標區塊 */
  .econ-group { margin-bottom: 24px; }
  .econ-group-title {
    font-size: 14px; font-weight: 600; color: var(--text2);
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .econ-grid {
    display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
  }
  @media(max-width:900px){ .econ-grid{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:500px){ .econ-grid{grid-template-columns:1fr} }
  .econ-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    transition: border-color .15s;
  }
  .econ-card:hover { border-color: var(--border2); }
  .econ-card-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px;
  }
  .econ-card-title { font-size: 13px; color: #c8cdd8; }
  .econ-card-update { font-size: 12px; color: var(--text2); text-align: right; line-height: 1.4; }
  .econ-value { font-size: 24px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 2px; }
  .econ-prev { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
  .econ-chart-wrap { position: relative; width: 100%; height: 80px; }
  /* 外部連結卡片 */
  .econ-link-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    display: flex; flex-direction: column; justify-content: space-between;
    transition: all .2s ease; min-height: 120px;
    text-decoration: none; color: inherit;
  }
  .econ-link-title { font-size: 13px; color: #c8cdd8; margin-bottom: 4px; }
  .econ-link-note { font-size: 11px; color: var(--text2); margin-bottom: 8px; flex: 1; }
  .econ-link-update { font-size: 10px; color: var(--text3); margin-bottom: 8px; }

  @media print {
    .topbar { position: static !important; }
    .pdf-btn { display: none !important; }
    body { background: #fff !important; color: #000 !important; }
    .card, .gauge-tile, .sub-card, .econ-card, .econ-link-card {
      border: 1px solid #ccc !important;
      background: #fff !important;
      break-inside: avoid;
    }
    .section-label { color: #333 !important; }
    .card-title, .mt-label, .gauge-label, .econ-card-title { color: #555 !important; }
    canvas { max-width: 100% !important; }
  }

  .pdf-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border2); background: transparent;
    color: var(--text2); font-size: 12px; cursor: pointer; transition: all .15s;
  }
  .pdf-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--green); }
  .pdf-btn svg { width: 13px; height: 13px; }

  /* Hover 高光效果 */
  .clickable-tile {
    cursor: pointer;
    transition: all .2s ease;
    text-decoration: none;
    display: block;
    color: inherit;
  }
  .clickable-tile:hover {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.25) !important;
    background: rgba(255,255,255,0.05) !important;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .clickable-tile:hover .gauge-label,
  .clickable-tile:hover .mt-label { color: var(--text2); }

  /* 資產價格區塊 */
  .assets-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  @media(max-width:1000px){ .assets-grid{grid-template-columns:repeat(3,1fr)} }
  @media(max-width:600px){ .assets-grid{grid-template-columns:repeat(2,1fr)} }
  .asset-tile {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 14px;
  }
  .asset-label { font-size: 13px; color: #c8cdd8; letter-spacing:.03em; text-transform:uppercase; margin-bottom: 6px; }
  .asset-value { font-size: 18px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 3px; }
  .asset-change { font-size: 11px; }
  .asset-change.up { color: var(--red); }
  .asset-change.dn { color: var(--green); }
  .asset-change.nt { color: var(--text3); }
  .asset-date { font-size: 11px; color: var(--text2); margin-top: 4px; }
  .asset-loading { font-size: 11px; color: var(--text3); padding: 20px 0; text-align:center; }
</style>

<body>

<div class="topbar">

<div class="container">

  <!-- 頂部說明 -->
  <div style="font-size:11px;color:var(--text2);text-align:center;padding:8px 0 20px;letter-spacing:.02em;background:rgba(77,158,255,0.06);border:1px solid rgba(77,158,255,0.15);border-radius:8px;margin-bottom:20px;padding:10px 16px">

        <button class="range-tab" data-r="ALL">ALL(20Y)</button>
      </div>

      GlobalMacro Dashboard · 資料來源：FRED & Yahoo Finance
    </div>

         alt="Visitors" style="opacity:.7">

<script>
const COUNTRIES = [
  { key:'us', label:'美國',    color:'#4d9eff', dash:[] },
  { key:'de', label:'德國(EU)', color:'#3ecf8e', dash:[6,3] },
  { key:'gb', label:'英國',    color:'#f7a830', dash:[3,3] },
  { key:'jp', label:'日本',    color:'#a78bfa', dash:[8,4] },
  { key:'au', label:'澳洲',    color:'#2dd4bf', dash:[4,2] },
];

let raw = null;
let yChart = null, vChart = null, bChart = null;
let econCharts = {};
let curRange = '3M';

const DATA_URL = 'data.json';

async function loadData() {
  const r = await fetch(DATA_URL + '?t=' + Date.now());
  if (!r.ok) throw new Error(`data.json 讀取失敗 (HTTP ${r.status})`);
  return await r.json();
}

function filterByRange(arr, range) {
  if (range === 'ALL' || !arr.length) return arr;
  const days = { '1M': 31, '3M': 92, '6M': 183, '1Y': 365, '3Y': 1095 };
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - (days[range] || 92));
  const cutStr = cutoff.toISOString().split('T')[0];
  return arr.filter(p => p.d >= cutStr);
}

function extendMonthly(arr) {
  if (arr.length < 2) return arr;
  const today = new Date().toISOString().split('T')[0];
  const last = arr[arr.length - 1];
  if (last.d < today) return [...arr, { d: today, v: last.v }];
  return arr;
}

function trendBadge(arr) {
  if (arr.length < 15) return '';
  const recent = arr.slice(-5).reduce((a,b) => a + b.v, 0) / 5;
  const prev   = arr.slice(-15,-10).reduce((a,b) => a + b.v, 0) / 5;
  const diff = recent - prev;
  if (diff >  0.15) return '<span class="trend-badge trend-up">↑ 上升</span>';
  if (diff < -0.15) return '<span class="trend-badge trend-dn">↓ 下降</span>';
  return '<span class="trend-badge trend-fl">— 持平</span>';
}

function mkOpts(tooltipLabel, yTickFn) {
  return {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1e28',
        borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
        titleColor: '#8b90a0', bodyColor: '#e8eaf0',
        titleFont: { size: 11 }, bodyFont: { size: 12 }, padding: 10,
        callbacks: { label: tooltipLabel }
      }
    },
    scales: {
      x: {
        ticks: { maxTicksLimit: 8, font: { size: 10 }, color: '#555a6a', autoSkip: true },
        grid: { color: 'rgba(255,255,255,0.04)' }, border: { display: false }
      },
      y: {
        ticks: { font: { size: 10 }, color: '#555a6a', callback: yTickFn },
        grid: { color: 'rgba(255,255,255,0.04)' }, border: { display: false }
      }
    }
  };
}

function mkMiniOpts(tooltipLabel, yTickFn) {
  return {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#1a1e28',
        borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1,
        titleColor: '#8b90a0', bodyColor: '#e8eaf0',
        titleFont: { size: 10 }, bodyFont: { size: 11 }, padding: 8,
        callbacks: { label: tooltipLabel }
      }
    },
    scales: {
      x: {
        ticks: { maxTicksLimit: 4, font: { size: 9 }, color: '#555a6a', autoSkip: true },
        grid: { display: false }, border: { display: false }
      },
      y: {
        ticks: { font: { size: 9 }, color: '#555a6a', maxTicksLimit: 3, callback: yTickFn },
        grid: { color: 'rgba(255,255,255,0.04)' }, border: { display: false }
      }
    }
  };
}

function renderYield(range) {
  const wrap = document.getElementById('yieldWrap');
  const metEl = document.getElementById('yieldMetrics');

  const filtered = COUNTRIES.map(c => {
    const arr = raw[c.key] || [];
    const f = filterByRange(arr, range);
    return c.key === 'us' ? f : extendMonthly(f);
  });
  const dates = [...new Set(filtered.flatMap(d => d.map(p => p.d)))].sort();

  wrap.innerHTML = '';
  const canvas = document.createElement('canvas');
  canvas.setAttribute('role','img');
  canvas.setAttribute('aria-label','5國10年期公債殖利率走勢');
  wrap.appendChild(canvas);

  const datasets = COUNTRIES.map((c, i) => {
    const mp = Object.fromEntries(filtered[i].map(p => [p.d, p.v]));
    return {
      label: c.label,
      data: dates.map(d => mp[d] ?? null),
      borderColor: c.color,
      backgroundColor: c.color + '15',
      borderWidth: 1.8,
      borderDash: c.dash,
      pointRadius: 0, pointHoverRadius: 5,
      tension: 0.3, spanGaps: true, fill: false
    };
  });

  if (yChart) yChart.destroy();
  yChart = new Chart(canvas, {
    type: 'line',
    data: { labels: dates, datasets },
    options: mkOpts(
      ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(2)}%`,
      v => v.toFixed(1) + '%'
    )
  });

  const YIELD_LINKS = { us: 'https://schrts.co/VXsnZzRZ' };
  metEl.innerHTML = COUNTRIES.map((c, i) => {
    const d = filtered[i]; if (!d.length) return '';

// YoY 計算：把指數序列轉成年增率 %

function fmtDataPeriod(d) {
  if (!d) return '';
  const parts = d.split('-');
  return `${parts[0]}年${parseInt(parts[1])}月份數據`;
}
function calcYoY(arr) {
  const dateMap = {};
  arr.forEach(p => { dateMap[p.d] = p.v; });
  const result = [];
  for (const p of arr) {
    const prevYear = (parseInt(p.d.slice(0,4)) - 1).toString();
    const prevDate = prevYear + p.d.slice(4);
    if (dateMap[prevDate] && dateMap[prevDate] > 0) {
      const yoy = (p.v - dateMap[prevDate]) / dateMap[prevDate] * 100;
      result.push({ d: p.d, v: Math.round(yoy * 100) / 100, p: p.p });
    }
  }
  return result;
}

function renderMiniChart(canvasId, arr, color) {
  // 只顯示近 2 年
  const cutoff = new Date();
  cutoff.setFullYear(cutoff.getFullYear() - 2);
  const cutStr = cutoff.toISOString().split('T')[0];
  const data = arr.filter(p => p.d >= cutStr);
  if (!data.length) return;

  if (econCharts[canvasId]) { econCharts[canvasId].destroy(); delete econCharts[canvasId]; }
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  econCharts[canvasId] = new Chart(canvas, {
    type: 'line',
    data: {
      labels: data.map(p => p.d),
      datasets: [{ data: data.map(p => p.v),
        borderColor: color, backgroundColor: color + '15',
        borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true }]
    },
    options: mkMiniOpts(c => ` ${c.parsed.y?.toFixed(2)}`, v => v.toFixed(1))
  });
}

function renderEcon() {
  const sec = document.getElementById('econSection');
  let html = '';

  for (const [regionKey, region] of Object.entries(ECON_INDICATORS)) {
    const hasData = region.items.some(item => (raw[item.key]||[]).length > 0);
    const hasLinks = region.links.length > 0;
    if (!hasData && !hasLinks) continue;

    html += `<div class="econ-group">
      <div class="econ-group-title">${region.title}</div>
      <div class="econ-grid">`;

    // 資料卡片
    for (const item of region.items) {
      const rawArr = raw[item.key] || [];
      if (!rawArr.length) continue;
      const arr = item.yoy ? calcYoY(rawArr) : rawArr;
      if (!arr.length) continue;
      const lat = arr[arr.length-1];
      const prv = arr.length > 1 ? arr[arr.length-2] : null;
      // mom:true → 顯示月增量（差值）
      const displayVal = item.mom ? (prv ? (lat.v - prv.v) : 0) : lat.v;
      const prevVal    = item.mom ? (arr.length > 2 ? arr[arr.length-3].v - arr[arr.length-2].v : 0) : (prv ? prv.v : null);
      const chg = prevVal != null ? displayVal - prevVal : 0;
      const chgSign = chg > 0 ? '▲' : chg < 0 ? '▼' : '—';
      const chgCls = chg > 0 ? 'color-red' : chg < 0 ? 'color-green' : 'color-text2';
      const canvasId = `ec_${item.key}`;

      html += `<div class="econ-card">
        <div class="econ-card-header">
          <div class="econ-card-title">${item.label}</div>
          <div class="econ-card-update">
            ${item.note}<br>
            <span style="color:var(--text3)">${fmtDataPeriod(lat.d)}</span>
          </div>
        </div>
        <div class="econ-value" style="color:${item.color}">${item.fred_delay ? `<div style="font-size:10px;color:var(--text3);line-height:1.6;font-weight:normal;letter-spacing:0">FRED延遲更新　<a href="${item.ref_url}" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:none" onclick="event.stopPropagation()">查看最新數據 ↗</a></div>` : ''}${item.fmt(displayVal)}</div>
        <div class="econ-prev">
          ${prevVal != null ? `前值 ${item.fmt(prevVal)} <span class="${chgCls}">${chgSign} ${Math.abs(chg).toFixed(2)}</span>` : ''}
        </div>
        <div class="econ-chart-wrap"><canvas id="${canvasId}"></canvas></div>
      </div>`;
    }

    // 外部連結卡片
    for (const link of region.links) {
      html += `<a class="econ-link-card clickable-tile" href="${link.url}" target="_blank" rel="noopener">
        <div>
          <div class="econ-link-title">${link.label}</div>
          <div class="econ-link-update">📅 ${link.note}</div>
        </div>
        <div class="ext-link">查看最新數據 ↗</div>
      </a>`;
    }

    html += `</div></div>`;
  }

  sec.innerHTML = html || '<div style="color:var(--text3);padding:20px">無資料</div>';

  // 渲染迷你圖
  for (const region of Object.values(ECON_INDICATORS)) {
    for (const item of region.items) {
      const rawArr = raw[item.key] || [];
      if (!rawArr.length) continue;
      let arr;
      if (item.yoy) arr = calcYoY(rawArr);
      else if (item.mom) arr = rawArr.slice(1).map((p,i) => ({d:p.d, v: p.v - rawArr[i].v, p: p.p}));
      else arr = rawArr;
      if (arr.length) renderMiniChart(`ec_${item.key}`, arr, item.color);
    }
  }
}
