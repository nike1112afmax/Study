        /* 免費日式紋樣背景圖（偏淡紙紋／波紋） */

            border: 1px solid rgba(200, 180, 160, 0.4);
            border-radius: 16px;
            box-shadow: 0 4px 18px rgba(170, 150, 130, 0.15);
        }
        .kira-header {
            background: rgba(255, 248, 235, 0.94);
            border-bottom: 1px solid rgba(210, 195, 175, 0.5);
        }
        .kira-link {
            transition: all 0.3s ease;
        }
        .kira-link:hover {
            background: rgba(220, 210, 190, 0.5);
            border-color: rgba(160, 140, 120, 0.5);
            transform: translateX(6px);
        }

        /* 小邊欄／角落日式線條插圖 */
        .motif-corner {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 120px;
            height: 120px;
            opacity: 0.3;
            pointer-events: none;
        }
        .motif-corner svg {
            width: 100%;
            height: 100%;
            fill: #9a5c40;
        }

</head>
